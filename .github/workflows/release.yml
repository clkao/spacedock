# Cuts a GitHub Release on every v* tag: goreleaser cross-builds the darwin
# arm64+amd64 tarballs, writes checksums.txt, publishes the release, and bumps
# the homebrew-tap formula. Runs on macOS so the released darwin binaries are
# built natively.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + tags so `git describe --tags` resolves the version
          # goreleaser stamps into internal/cli.Version.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # GITHUB_TOKEN creates the release on this repo. HOMEBREW_TAP_TOKEN is a
          # PAT with write access to spacedock-dev/homebrew-tap so the brews block
          # can push the formula bump cross-repo (the default GITHUB_TOKEN cannot
          # write to another repository).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
